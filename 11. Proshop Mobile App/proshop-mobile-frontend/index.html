<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f3460">
  <title>ProShop Mobile</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <h1>ProShop</h1>
      <div id="header-status" class="header-status disconnected" title="Connection status"></div>
    </header>

    <!-- Main Content -->
    <main class="app-content" id="content">
      <div class="loading"><div class="spinner"></div>Loading...</div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="dashboard" onclick="App.navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Home
      </button>
      <button class="nav-item" data-view="search" onclick="App.navigate('search')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Search
      </button>
      <button class="nav-item" data-view="scanner" onclick="App.navigate('scanner')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><circle cx="17.5" cy="17.5" r="3.5"/>
        </svg>
        Scan
      </button>
      <button class="nav-item" data-view="count" onclick="App.navigate('count')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        Count
      </button>
      <button class="nav-item" data-view="chat" onclick="App.navigate('chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
      </button>
    </nav>
  </div>

  <script src="js/api.js"></script>
  <script src="js/jsQR.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/counter.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Force service worker update on every page load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.update();
      }).catch(() => {});
      // Also clear old caches on load
      if ('caches' in window) {
        caches.keys().then(keys => {
          keys.forEach(key => {
            if (!key.includes('v8')) caches.delete(key);
          });
        });
      }
    }
  </script>
</body>
</html>
